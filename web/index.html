<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="scaffolded-by" content="https://github.com/dart-lang/sdk">
    <title>order_exam_app</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="main.dart.js"></script>
</head>

<body>
  <main class="page">
    <section class="card">
      <h1>My Order</h1>

      <div class="form-grid">
        <label>
          Item
          <input id="itemInput" type="text" placeholder="Item code" maxlength="20">
        </label>

        <label>
          Item Name
          <input id="itemNameInput" type="text" placeholder="Item name" maxlength="80">
        </label>

        <label>
          Price
          <input id="priceInput" type="number" placeholder="Price" min="1" step="0.01">
        </label>

        <label>
          Quantity
          <input id="quantityInput" type="number" placeholder="Quantity" min="1" step="1">
        </label>

        <label>
          Currency
          <input id="currencyInput" type="text" placeholder="Currency" value="USD" maxlength="8">
        </label>

        <div class="form-action">
          <button id="addButton" type="button">Add Item to Cart</button>
        </div>
      </div>

      <div class="search-row">
        <label for="searchInput">Search by Item Name</label>
        <input id="searchInput" type="text" placeholder="Type to filter...">
      </div>

      <p id="statusMessage" class="status" aria-live="polite"></p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Id</th>
              <th>Item</th>
              <th>Item Name</th>
              <th>Quantity</th>
              <th>Price</th>
              <th>Currency</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>

      <div class="pagination" aria-label="Orders pagination">
        <button id="prevPageButton" type="button" class="page-btn">Previous</button>
        <span id="pageInfo" class="page-info">Page 1 / 1</span>
        <button id="nextPageButton" type="button" class="page-btn">Next</button>
      </div>
    </section>
  </main>

</body>
</html>
